baseURL = 'https://nherve.dev/'

locale = "en"
defaultContentLanguage = "en"
hasCJKLanguage = false
languageCode = 'en-US'

title = "N(H)erve'd powered chronicles"

theme = "DoIt"

enableRobotsTXT= true

